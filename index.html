<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <!-- Google Fonts for an elegant textual look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <h1 class="brand">FOUNDATION</h1>
        <button id="settings-btn" class="icon-btn" aria-label="Settings">
            <!-- Simple SVG Gear Icon -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </header>

    <main class="dashboard-container">
        <!-- Search and Add Bar -->
        <section class="action-bar">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search references...">
            </div>
            <button id="add-verse-btn" class="primary-btn">+ Add</button>
        </section>

        <!-- Grid Container for Verse Cards -->
        <section id="card-grid" class="card-grid">
            
            <!-- Example Card Structure matching image_690901.png -->
            <div class="card-wrapper">
                <div class="flip-card" onclick="this.classList.toggle('flipped')">
                    
                    <!-- Front of Card: Reference Mode -->
                    <div class="card-face card-front phase-1">
                        <div class="card-content">
                            <span class="phase-label">PHASE 1 &bull; DEEP BURN</span>
                            <h2 class="verse-reference">Romans 12:1-2</h2>
                            <div class="target-badge">25x today</div>
                        </div>
                    </div>
                    
                    <!-- Back of Card: Cipher Mode -->
                    <div class="card-face card-back">
                        <div class="card-content">
                            <span class="cipher-title">ROMANS 12:1-2</span>
                            <p class="cipher-text">I b y t, b, b t m o G, t y p y b a a l s, h, a t G, w i y s w. A d n b c t t w, b b t b t r o y m...</p>
                            <div class="card-actions" onclick="event.stopPropagation();">
                                <button class="complete-btn">Complete</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </section>
    </main>

    <script src="index.js" defer></script>
</body>
</html>
